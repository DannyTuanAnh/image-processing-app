version: "3.8"

services:
  mysql:
    image: mysql:8.0.45-debian
    container_name: upload-pic-web
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: file_db
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
