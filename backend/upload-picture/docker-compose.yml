version: "3.8"

services:
  db:
    image: mysql:8.0.45-debian
    environment:
      MYSQL_ROOT_PASSWORD: 1108
      MYSQL_DATABASE: file_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    depends_on:
      - db
    ports:
      - "8090:8090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/file_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1108

volumes:
  db_data:
