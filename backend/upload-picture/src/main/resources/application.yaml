server:
  port: 8090
  servlet:
    context-path: "/upload"

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3308/file_db}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:1108}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
