steps:
  # Step 1: Build the Docker image for backend
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/upload-picture:$SHORT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/upload-picture:latest"
      - "-f"
      - "backend/upload-picture/Dockerfile"
      - "."

  # Step 2: Push image to Google Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/upload-picture:$SHORT_SHA"

  # Step 3: Deploy backend to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "upload-picture"
      - "--image=gcr.io/$PROJECT_ID/upload-picture:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=1Gi"
      - "--cpu=2"
      - "--set-env-vars=SPRING_DATASOURCE_URL=${_DB_URL},SPRING_DATASOURCE_USERNAME=${_DB_USER},SPRING_DATASOURCE_PASSWORD=${_DB_PASSWORD},GCP_PROJECT_ID=$PROJECT_ID,GCS_BUCKET_NAME=${_GCS_BUCKET}"

images:
  - "gcr.io/$PROJECT_ID/upload-picture:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/upload-picture:latest"

options:
  machineType: "N1_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY

timeout: "1800s"

substitutions:
  _REGION: "us-central1"
  _DB_URL: "jdbc:mysql://localhost:3308/file_db"
  _DB_USER: "root"
  _DB_PASSWORD: "1108"
  _GCS_BUCKET: "your-bucket-name"
      - "frontend/Dockerfile"
      - "frontend"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/image-web:$SHORT_SHA"

  - name: "gcr.io/cloud-builders/cloud-run"
    args:
      - "deploy"
      - "image-web"
      - "--image=gcr.io/$PROJECT_ID/image-web:$SHORT_SHA"
      - "--region=asia-southeast1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=512Mi"
      - "--set-env-vars=VITE_API_URL=https://${_BACKEND_DOMAIN}/upload"

images:
  - "gcr.io/$PROJECT_ID/image-api:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/image-api:latest"
  - "gcr.io/$PROJECT_ID/image-web:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/image-web:latest"

options:
  machineType: "N1_HIGHCPU_8"

substitutions:
  _GCS_BUCKET: "your-gcs-bucket-name"
  _DB_USER: "app_user"
  _DB_PASSWORD: "app_password"
  _BACKEND_DOMAIN: "image-api-xxxxx.run.app"

timeout: "1800s"
