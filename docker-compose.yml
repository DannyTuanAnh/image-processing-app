services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1108
      MYSQL_DATABASE: file_db
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "${MYSQL_HOST_PORT:-3308}:3306"
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1108"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend/upload-picture
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/file_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1108
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8090:8090"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://backend:8090/upload}
    restart: unless-stopped
    ports:
      - "5173:80"

volumes:
  db_data:
