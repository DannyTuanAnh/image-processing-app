server {
    listen       80;
    server_name  localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API requests are expected to call the backend via the absolute URL
    # injected at build time (VITE_API_URL). Remove proxy_pass to avoid
    # nginx failing to resolve the `backend` hostname during startup.
}
